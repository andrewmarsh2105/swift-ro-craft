<!--
  RO Navigator — Full Wordmark (transparent background)

  Two-tone wordmark used in the landing and app headers.
  Transparent background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">RO Navigator logo</title>
  <desc id="desc">Blue gradient RO with navy Navigator wordmark on a transparent background.</desc>

  <defs>
    <linearGradient id="roGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D78FF" />
      <stop offset="100%" stop-color="#0A5CDE" />
    </linearGradient>
  </defs>

  <text
    x="0"
    y="128"
    font-family="Inter, Arial, sans-serif"
    font-size="140"
    font-weight="900"
    letter-spacing="-7"
    fill="url(#roGradient)"
  >RO</text>

  <text
    x="206"
    y="128"
    font-family="Inter, Arial, sans-serif"
    font-size="140"
    font-weight="800"
    letter-spacing="-4"
    fill="#04064A"
  >Navigator</text>
</svg>
