<!--
  RO Navigator — Full Wordmark (transparent background)

  Two-tone: "RO" in brand blue #2B82F0, "Navigator" in brand navy #0C1829.
  Transparent background — safe to overlay on any surface.

  For in-app use the Logo React component (src/components/brand/Logo.tsx)
  which renders the wordmark inline with loaded Inter font.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 52" fill="none">

  <!-- "RO" — brand blue, Inter Black 900 -->
  <text
    x="0" y="40"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="40"
    letter-spacing="-1"
    fill="#2B82F0"
  >RO</text>

  <!-- "Navigator" — brand navy, Inter ExtraBold 800 -->
  <text
    x="60" y="40"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-1"
    fill="#0C1829"
  >Navigator</text>

</svg>
