<!--
  RO Navigator — Favicon SVG
  The reticle-O mark on a deep navy rounded-square background.

  Construction (32×32 coordinate space):
    Background:  32×32 rect, rx=6, fill #0C1829
    Circle:      cx=16, cy=16, r=9.5, stroke-width=1.5, color #F5A623
    Tick (11 o'clock, 240° from +x axis):
      cos(240°)=-0.5  sin(240°)=-0.866
      Inner edge radius: 9.5 - 0.75 = 8.75
      Start: (16 + 8.75×-0.5,  16 + 8.75×-0.866) = (11.6, 8.4)
      End:   start + 2.7 × (0.5, 0.866)            = (13.0, 10.8)

  Usage:
    favicon.ico   — convert this SVG, or use as native SVG favicon
    16×16 PNG     — export at 16px, verify tick remains visible
    32×32 PNG     — export at 32px, primary raster favicon
    apple-touch   — export as 180×180 with same composition
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Container background -->
  <rect width="32" height="32" rx="6" fill="#0C1829"/>

  <!-- Reticle circle -->
  <circle
    cx="16" cy="16" r="9.5"
    fill="none"
    stroke="#F5A623"
    stroke-width="1.5"
  />

  <!--
    Indicator tick — 11 o'clock
    Points from the circle's inner edge toward the center.
    strokeLinecap="round" keeps it crisp at sub-pixel sizes.
  -->
  <line
    x1="11.6" y1="8.4"
    x2="13.0" y2="10.8"
    stroke="#F5A623"
    stroke-width="1.5"
    stroke-linecap="round"
  />

</svg>
